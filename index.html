<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | UC Satışı</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed; 
            background-size: cover; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden;
        }

        body::before { 
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; 
        }

        .container { max-width: 480px; margin: auto; padding: 20px; }

        /* Header & Auth */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        
        .auth-group { display: flex; align-items: center; gap: 10px; }
        .user-chip { display: none; background: var(--glass); border: 1px solid rgba(255,215,0,0.3); padding: 4px 8px; border-radius: 50px; backdrop-filter: blur(10px); align-items: center; gap: 8px; }
        .avatar-circle { width: 24px; height: 24px; background: var(--gold); border-radius: 50%; background-size: cover; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; font-size: 0.7rem; }

        /* Sifariş Düyməsi (Girişin yanındakı kiçik düymə) */
        .order-history-btn {
            display: none; background: var(--gold); color: #000; border: none; padding: 6px 12px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }

        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; }

        /* Payment Card */
        .payment-card { 
            background: linear-gradient(135deg, #1a1a1a 0%, #e31e24 100%); padding: 25px; border-radius: 20px; margin: 15px 0; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        /* UC Grid */
        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .uc-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .uc-card:active { transform: scale(0.95); border-color: var(--gold); }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.75rem; }

        /* Sifariş Paneli */
        .order-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh;
            background: #0f0f0f; border-radius: 25px 25px 0 0; z-index: 1000;
            transition: 0.4s ease-out; padding: 25px 20px; border-top: 2px solid var(--gold);
        }
        .order-panel.active { bottom: 0; }
        .close-panel { position: absolute; top: 10px; right: 20px; font-size: 1.5rem; color: #888; cursor: pointer; }
        
        .order-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-size: 0.6rem; padding: 3px 7px; border-radius: 5px; background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #111; width: 85%; max-width: 320px; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }

        .main-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleOrders()"></div>
<div class="order-panel" id="orderPanel">
    <span class="close-panel" onclick="toggleOrders()">×</span>
    <h3 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 15px; font-size: 0.9rem;">SİFARİŞ TARİXÇƏM</h3>
    <div id="ordersList" style="max-height: 85%; overflow-y: auto;"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-box">
        <h3 style="color: var(--gold); margin-bottom: 20px; font-family: 'Orbitron';">GİRİŞ</h3>
        <div id="g_id_onload" data-client_id="512841497901-215itq61u0rv1e1ho8fin2jceestn0am.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <button onclick="closeModal()" style="background:none; border:none; color:#888; margin-top:20px; cursor:pointer;">Ləğv et</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">STARGAMEAZ</div>
        <div class="auth-group">
            <button id="orderHistoryBtn" class="order-history-btn" onclick="toggleOrders()">Sifarişlər</button>
            <div id="userChip" class="user-chip">
                <div class="avatar-circle" id="userIcon">?</div>
            </div>
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">GİRİŞ</button>
        </div>
    </div>

    <div class="payment-card">
        <div style="font-size: 0.6rem; opacity: 0.7; letter-spacing: 1px;">KÖÇÜRMƏ ÜÇÜN KART NÖMRƏSİ:</div>
        <div style="font-family: 'Orbitron'; font-size: 1.1rem; margin: 12px 0;">4169 7388 6262 7472</div>
        <button onclick="copyCard()" style="background:#fff; border:none; color:#e31e24; padding:8px; border-radius:8px; width:100%; font-weight:700; cursor:pointer; font-size: 0.7rem;">KART NÖMRƏSİNİ KOPYALA</button>
    </div>

    <div style="background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
        <input type="tel" id="playerID" class="main-input" placeholder="PUBG ID-nizi daxil edin">
        <button class="btn-premium" style="width:100%; background:#fff; color:#000;" onclick="verifyID()">ID YOXLA</button>
        <div id="idStatus" style="margin-top:10px; text-align:center; font-size:0.8rem; font-weight: 700;"></div>
    </div>

    <div class="uc-grid" id="productGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;

    function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    
    function toggleOrders() {
        const panel = document.getElementById('orderPanel');
        panel.classList.toggle('active');
        document.getElementById('overlay').style.display = panel.classList.contains('active') ? 'block' : 'none';
        if(currentUser) loadOrders();
    }

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload;
        closeModal();
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userChip').style.display = 'flex';
        document.getElementById('orderHistoryBtn').style.display = 'block';
        if(payload.picture) document.getElementById('userIcon').style.backgroundImage = `url(${payload.picture})`;
        loadOrders();
    }

    const products = [
        {u: "60 UC", p: "2.00 AZN"}, {u: "325 UC", p: "9.00 AZN"},
        {u: "660 UC", p: "16.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"}
    ];

    const grid = document.getElementById('productGrid');
    products.forEach(item => {
        grid.innerHTML += `<div class="uc-card" onclick="order('${item.u}', '${item.p}')"><b style="font-size:0.9rem;">${item.u}</b><br><span class="uc-price">${item.p}</span></div>`;
    });

    let verified = false;
    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 5) return alert("ID-ni düzgün yazın!");
        verified = true;
        document.getElementById('idStatus').innerHTML = "✅ TƏSDİQLƏNDİ: " + id;
        document.getElementById('idStatus').style.color = "#2ecc71";
    }

    function order(uc, price) {
        if(!verified) return alert("Öncə ID yoxlayın!");
        if(!currentUser) return showLogin();
        
        const id = document.getElementById('playerID').value;
        const orderData = {
            email: currentUser.email, uc, price, playerID: id,
            date: new Date().toLocaleString('az-AZ'), status: "Gözlənilir"
        };

        db.collection("orders").add(orderData).then(() => {
            loadOrders();
            window.open(`https://wa.me/994503482470?text=Salam!%0APaket: ${uc}%0AİD: ${id}`, '_blank');
        });
    }

    function loadOrders() {
        db.collection("orders").where("email", "==", currentUser.email).orderBy("date", "desc").limit(10).get().then(snap => {
            const list = document.getElementById('ordersList');
            if(snap.empty) { list.innerHTML = "<p style='text-align:center; padding:20px; color:#555;'>Sifarişiniz yoxdur.</p>"; return; }
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="order-item"><div><b>${d.uc}</b><br><small style="font-size:0.55rem; opacity:0.5;">${d.date}</small></div><div class="status-badge">${d.status}</div></div>`;
            });
        });
    }

    function copyCard() { navigator.clipboard.writeText("4169738862627472"); alert("Kart nömrəsi kopyalandı!"); }
</script>
</body>
</html>
