<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>StarGameAze | Sürətli Yükləmə</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #0A0A0A; --card: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .bank-box { background: #1A1A1A; border: 1px solid var(--gold); padding: 20px; border-radius: 15px; }
        .card-num { color: var(--gold); font-size: 1.6rem; font-weight: 700; }
        
        /* Rəqəm girişi üçün stil */
        #pid { 
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #444; 
            background: #000; color: #fff; text-align: center; font-size: 1.1rem; box-sizing: border-box; 
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 25px; }
        .product { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .product:hover { border-color: var(--gold); transform: scale(1.02); }
        .uc-name { font-weight: 600; margin-bottom: 5px; }
        .price { color: var(--gold); font-weight: 700; }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: var(--gold);">ID yoxlanılır...</p>
</div>

<div class="wrapper">
    <div class="header">
        <h1>STARGAMEAZE</h1>
        <div class="bank-box">
            <div>BİNBANK KÖÇÜRMƏ</div>
            <div class="card-num">4169 7388 6262 7472</div>
        </div>
        <input type="number" id="pid" placeholder="Oyunçu ID-sini daxil et (yalnız rəqəm)..." oninput="this.value = this.value.replace(/[^0-9]/g, '');">
    </div>

    <div class="grid" id="items"></div>
</div>

<script>
    const data = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"}, {u: "90 UC", p: "3.00 AZN"},
        {u: "120 UC", p: "4.00 AZN"}, {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "8.50 AZN"}, {u: "355 UC", p: "9.50 AZN"}, {u: "385 UC", p: "10.50 AZN"},
        {u: "660 UC", p: "16.00 AZN"}, {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "24.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"}, {u: "3850 UC", p: "81.00 AZN"},
        {u: "8100 UC", p: "155.00 AZN"}, {u: "16200 UC", p: "310.00 AZN"}
    ];

    const container = document.getElementById('items');
    data.forEach(i => {
        container.innerHTML += `
            <div class="product" onclick="checkAndSend('${i.u}', '${i.p}')">
                <div class="uc-name">${i.u}</div>
                <div class="price">${i.p}</div>
            </div>
        `;
    });

    function checkAndSend(u, p) {
        let pid = document.getElementById('pid').value;
        // ID 5 rəqəmdən azdırsa xəbərdarlıq et
        if(pid.length < 5) { alert("Xahiş edirik düzgün Oyunçu ID-sini (minimum 5 rəqəm) daxil edin!"); return; }
        
        document.getElementById('loader').style.display = 'flex';
        
        setTimeout(() => {
            window.open(`https://wa.me/994503482470?text=Salam, StarGameAze-dən ${u} almaq istəyirəm. ID: ${pid}`, '_blank');
            document.getElementById('loader').style.display = 'none';
        }, 2000);
    }
</script>

</body>
</html>
