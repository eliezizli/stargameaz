    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>

            box-shadow: 0 8px 25px rgba(227, 30, 36, 0.2); border: 1px solid rgba(255,255,255,0.1);
        }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 2px; text-align: center; display: block; margin: 10px 0; color: #fff; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(15px); margin-bottom: 20px; }
        .main-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 1rem; margin-bottom: 12px; outline: none; }

        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .uc-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .uc-card:active { transform: scale(0.95); border-color: var(--gold); }
        .uc-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; }

        /* --- DƏSTƏK WIDGET STİLLƏRİ --- */
        #support-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        #support-main-btn { 
            background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; 
            display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
        }
        #support-main-btn img { width: 22px; }
        #support-menu { 
            position: absolute; bottom: 65px; right: 0; width: 260px; 
            background: #111; border: 1px solid var(--gold); border-radius: 15px; 
            display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .support-header { background: var(--gold); color: #000; padding: 12px; font-weight: bold; font-size: 0.8rem; text-align: center; }
        .support-option { 
            display: flex; align-items: center; padding: 15px; gap: 12px;
            color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s; cursor: pointer;
        }
        .support-option:hover { background: rgba(255,255,255,0.05); }
        .support-option b { display: block; font-size: 0.9rem; }
        .support-option small { font-size: 0.75rem; color: #aaa; }
        .active-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
