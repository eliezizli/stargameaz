<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | Rəsmi UC Mağazası</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; }
        .wrapper { max-width: 600px; margin: auto; padding-bottom: 30px; }

        /* Navbar & Profile */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        .logo { font-weight: 700; font-size: 1.4rem; color: var(--gold); }
        .login-btn { 
            background: #fff; color: #000; border: none; padding: 8px 15px; 
            border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .user-profile { display: none; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 30px; border: 1px solid var(--gold); }
        .avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }

        /* Bank Card */
        .bank-box { 
            background: linear-gradient(135deg, var(--red) 0%, #9b1317 100%); 
            padding: 22px; border-radius: 22px; box-shadow: 0 10px 30px rgba(227,30,36,0.3); margin-bottom: 20px;
        }
        .card-num { font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; font-family: monospace; display: block; margin: 15px 0; }
        .copy-btn { background: #fff; border: none; color: var(--red); padding: 8px 16px; border-radius: 12px; font-weight: 700; float: right; cursor: pointer; }

        /* ID Input */
        .id-section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        #pid { width: 100%; box-sizing: border-box; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 10px; }
        #check-btn { width: 100%; background: var(--gold); border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; color: #000; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product { background: #151515; border: 1px solid #222; padding: 20px 10px; border-radius: 18px; text-align: center; cursor: pointer; }
        .uc-name { font-weight: 700; font-size: 1.2rem; display: block; margin-bottom: 5px; }
        .price { color: var(--gold); font-size: 1rem; font-weight: 600; }

        #live-notify { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.95); border-left: 4px solid var(--gold); padding: 12px; border-radius: 12px; font-size: 0.8rem; transform: translateX(-160%); transition: 0.5s; z-index: 1000; }
    </style>
</head>
<body>

<div id="live-notify">User_77 sifariş verdi 🔥</div>

<div class="wrapper">
    <div class="navbar">
        <div class="logo">StarGameAz</div>
        <button class="login-btn" id="loginBtn" onclick="signInWithGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_探_Logo.svg" width="16"> Giriş
        </button>
        <div class="user-profile" id="userProfile">
            <img src="" class="avatar" id="userPhoto">
            <div style="font-size: 0.75rem;"><b id="userName">User</b><br><span style="color:var(--gold)">Bonus: 0.00 AZN</span></div>
        </div>
    </div>

    <div class="bank-box">
        <button class="copy-btn" onclick="copyCard()">KOPYALA</button>
        <div style="font-size: 0.8rem; font-weight: 700;">BİNBANK</div>
        <span class="card-num" id="cardNo">4169 7388 6262 7472</span>
    </div>

    <div class="id-section">
        <input type="tel" id="pid" placeholder="Oyunçu ID-nizi yazın...">
        <button id="check-btn" onclick="checkPlayer()">ID YOXLA</button>
        <div id="player-info" style="text-align: center; margin-top: 10px; font-size: 0.85rem;"></div>
    </div>

    <div class="grid" id="items"></div>
</div>

<script>
    // SƏNİN FİREBASE KODLARIN
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHJosgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba",
        measurementId: "G-0JS6CP8NZZ"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Google Giriş Funksiyası
    function signInWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            updateUserUI(result.user);
        }).catch((error) => alert("Giriş xətası: " + error.message));
    }

    auth.onAuthStateChanged((user) => { if (user) updateUserUI(user); });

    function updateUserUI(user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userProfile').style.display = 'flex';
        document.getElementById('userName').innerText = user.displayName;
        document.getElementById('userPhoto').src = user.photoURL;
    }

    function copyCard() {
        const num = document.getElementById('cardNo').innerText.replace(/\s/g, '');
        navigator.clipboard.writeText(num).then(() => alert("Kart kopyalandı!"));
    }

    let isVerified = false;
    function checkPlayer() {
        const id = document.getElementById('pid').value;
        const info = document.getElementById('player-info');
        if(id.length < 7) { alert("ID yazın!"); return; }
        info.innerHTML = "🔍 Yoxlanılır...";
        setTimeout(() => {
            isVerified = true;
            info.innerHTML = `✅ ID: ${id} <span style="color:#2ecc71">AKTİV</span>`;
        }, 1200);
    }

    const products = [
        {u: "60 UC", p: "2.00 AZN"}, {u: "325 UC", p: "8.50 AZN"},
        {u: "660 UC", p: "16.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"}
    ];

    const container = document.getElementById('items');
    products.forEach(i => {
        container.innerHTML += `<div class="product" onclick="sendOrder('${i.u}', '${i.p}')"><span class="uc-name">${i.u}</span><span class="price">${i.p}</span></div>`;
    });

    function sendOrder(u, p) {
        const id = document.getElementById('pid').value;
        if(!isVerified) { alert("Öncə ID yoxlayın!"); return; }
        window.open(`https://wa.me/994503482470?text=Salam StarGameAz, ödəniş etdim.%0A Paket: ${u}%0A ID: ${id}`, '_blank');
    }

    setInterval(() => {
        const n = document.getElementById('live-notify');
        const ucs = ["60", "325", "660"];
        n.innerText = `Oyunçu indicə ${ucs[Math.floor(Math.random()*3)]} UC aldı 🔥`;
        n.style.transform = "translateX(0)";
        setTimeout(() => n.style.transform = "translateX(-160%)", 4000);
    }, 15000);
</script>
</body>
</html>
