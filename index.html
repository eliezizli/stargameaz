<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | Premium UC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --red: #ff4b2b; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.05); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        .container { max-width: 480px; margin: auto; padding: 20px; }

        /* Professional Navbar */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }

        .auth-section { display: flex; align-items: center; }
        .user-chip { display: none; background: var(--glass); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px; backdrop-filter: blur(10px); align-items: center; gap: 10px; animation: slideIn 0.5s ease; }
        .avatar-circle { width: 30px; height: 30px; background: var(--gold); border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5); }

        /* Card Section */
        .payment-card { background: linear-gradient(135deg, #ff4b2b, #ff416c); padding: 30px 20px; border-radius: 25px; margin-bottom: 25px; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(255, 75, 43, 0.3); }
        .card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; opacity: 0.8; margin-bottom: 10px; }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 3px; margin: 15px 0; display: block; }
        .btn-copy-card { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; backdrop-filter: blur(5px); font-weight: 600; }

        /* Input Styles */
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; backdrop-filter: blur(15px); margin-bottom: 25px; }
        .main-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .main-input:focus { border-color: var(--gold); background: rgba(0,0,0,0.6); }

        /* Products Grid */
        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .uc-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .uc-card:hover { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); transform: translateY(-5px); }
        .uc-card:active { transform: scale(0.95); }
        .uc-title { font-weight: 700; font-size: 1.3rem; color: #fff; display: block; margin-bottom: 5px; }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 600; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #1a1a1a; width: 85%; max-width: 380px; padding: 40px 30px; border-radius: 30px; border: 1px solid var(--gold); text-align: center; animation: zoomIn 0.3s ease; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="loginModal" class="modal">
    <div class="modal-box">
        <h2 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 15px;">GİRİŞ</h2>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 25px;">Sifarişləri izləmək üçün adınızı yazın</p>
        <input type="text" id="fullName" class="main-input" placeholder="Ad və Soyad">
        <button onclick="login()" class="btn-premium" style="width: 100%;">TƏSDİQLƏ</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">STARGAME</div>
        <div class="auth-section">
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">GİRİŞ</button>
            <div id="userChip" class="user-chip">
                <div class="avatar-circle" id="userIcon">?</div>
                <span id="userNameDisplay" style="font-weight: 600; font-size: 0.8rem;">Oyunçu</span>
            </div>
        </div>
    </div>

    <div class="payment-card">
        <div class="card-label">RƏSMİ ÖDƏNİŞ HESABI</div>
        <div class="card-number" id="cardNum">4169 7388 6262 7472</div>
        <button class="btn-copy-card" onclick="copyCard()">NÖMRƏNİ KOPYALA</button>
    </div>

    <div class="glass-panel">
        <p style="font-size: 0.8rem; text-align: center; margin-bottom: 10px; opacity: 0.7;">PUBG MOBİLE PLAYER ID</p>
        <input type="tel" id="playerID" class="main-input" placeholder="Məs: 5123456789">
        <button id="verifyBtn" class="btn-premium" style="width: 100%; background: #fff; color: #000;" onclick="verifyID()">ID YOXLA</button>
        <div id="idStatus" style="margin-top: 15px; text-align: center; font-weight: 700; font-size: 0.9rem;"></div>
    </div>

    <div class="uc-grid" id="productGrid"></div>
</div>

<script>
    const products = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"},
        {u: "90 UC", p: "3.00 AZN"}, {u: "120 UC", p: "4.00 AZN"},
        {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "8.50 AZN"}, {u: "355 UC", p: "9.50 AZN"},
        {u: "385 UC", p: "10.50 AZN"}, {u: "660 UC", p: "16.00 AZN"},
        {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "24.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"},
        {u: "16200 UC", p: "310.00 AZN"}
    ];

    function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    
    function login() {
        const name = document.getElementById('fullName').value;
        if(name.length < 3) return alert("Adınızı daxil edin");
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'none';
        const chip = document.getElementById('userChip');
        chip.style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = name;
        document.getElementById('userIcon').innerText = name[0].toUpperCase();
    }

    function copyCard() {
        const num = document.getElementById('cardNum').innerText.replace(/\s/g, '');
        navigator.clipboard.writeText(num);
        alert("Kart kopyalandı! m10 ilə ödəniş edin.");
    }

    let verified = false;
    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 7) return alert("ID yanlışdır");
        const status = document.getElementById('idStatus');
        status.innerHTML = "🔍 YOXLAYIR...";
        setTimeout(() => {
            verified = true;
            status.innerHTML = "✅ SİSTEMDƏ TAPILDI: " + id;
            status.style.color = "#2ecc71";
            document.getElementById('verifyBtn').style.opacity = "0.5";
        }, 1000);
    }

    const grid = document.getElementById('productGrid');
    products.forEach(item => {
        grid.innerHTML += `
            <div class="uc-card" onclick="order('${item.u}', '${item.p}')">
                <span class="uc-title">${item.u}</span>
                <span class="uc-price">${item.p}</span>
            </div>
        `;
    });

    function order(uc, price) {
        const name = document.getElementById('userNameDisplay').innerText;
        const id = document.getElementById('playerID').value;
        if(!verified) return alert("Öncə ID yoxlayın");
        if(name === "Oyunçu") { showLogin(); return; }
        
        const text = `Salam StarGameAz!%0A%0A📦 Paket: ${uc}%0A💰 Qiymət: ${price}%0A🆔 PUBG ID: ${id}%0A👤 Müştəri: ${name}`;
        window.open(`https://wa.me/994503482470?text=${text}`, '_blank');
    }
</script>
</body>
</html>
