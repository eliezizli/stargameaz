<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>StarGameAz | Ucuz PUBG Mobile UC Satışı (Birbank & m10)</title>
    <meta name="description" content="StarGameAz - Azərbaycanda ən sürətli PUBG UC yükləmə mərkəzi. Birbank və m10 ilə 7/24 təhlükəsiz ödəniş, anında təslim və sərfəli qiymətlər!">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/HJLz7PTz/Standard.png">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed;
            background-size: cover; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1;
        }

        .container { max-width: 480px; margin: auto; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; gap: 10px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; flex-shrink: 0; }
        
        /* WhatsApp Styles */
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 15px; background-color: #25d366; color: #fff;
            border-radius: 50px; display: flex; align-items: center; padding: 10px 16px;
            gap: 8px; z-index: 999; text-decoration: none; font-weight: 600; font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); border: 2px solid rgba(255, 255, 255, 0.1); cursor: pointer;
        }
        .whatsapp-float img { width: 22px; height: 22px; }

        .wa-menu {
            display: none; position: fixed; bottom: 80px; right: 15px; background: #1a1a1a;
            border: 1px solid var(--gold); border-radius: 15px; padding: 12px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); flex-direction: column; gap: 10px; min-width: 180px;
        }
        .wa-menu.active { display: flex; animation: slideUp 0.3s ease; }
        .wa-option {
            background: #25d366; color: white; text-decoration: none; padding: 12px;
            border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-align: center;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Payment Card & Inputs */
        .payment-card { background: linear-gradient(135deg, #1a1a1a 0%, #e31e24 100%); padding: 20px 15px; border-radius: 15px; margin: 15px 0; box-shadow: 0 8px 25px rgba(227, 30, 36, 0.2); border: 1px solid rgba(255,255,255,0.1); }
        .card-label { font-size: 0.65rem; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; opacity: 0.8; }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin: 10px 0; display: block; color: #fff; text-align: center; }
        .btn-copy-card { background: #fff; border: none; color: #e31e24; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
        
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(15px); margin-bottom: 20px; }
        .main-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 1rem; margin-bottom: 12px; outline: none; }
        .file-upload-label { display: block; padding: 14px; background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 0.8rem; color: #fff; }

        /* Grid */
        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 50px; }
        .uc-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .uc-card:active { transform: scale(0.95); border-color: var(--gold); background: rgba(255,215,0,0.1); }
        .uc-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; color: #fff; }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; }

        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .user-chip { display: none; background: var(--glass); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 50px; backdrop-filter: blur(10px); align-items: center; gap: 6px; }
        .avatar-circle { width: 26px; height: 26px; background: var(--gold); border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="wa-menu" id="waMenu">
    <div style="font-size: 0.65rem; color: var(--gold); margin-bottom: 5px; text-align: center; font-weight: bold; text-transform: uppercase;">Dəstək Xətti</div>
    <a href="https://wa.me/994503482470" class="wa-option" target="_blank">🟢 Dəstək 1 (Əsas)</a>
    <a href="https://wa.me/994507665112" class="wa-option" target="_blank">🟢 Dəstək 2 (Yeni)</a>
</div>

<div class="whatsapp-float" onclick="toggleWaMenu()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    <span>Canlı Dəstək</span>
</div>

<div class="container">
    <div class="header">
        <div class="logo">STARGAMEAZ</div>
        <div class="auth-section">
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">👤 GİRİŞ</button>
            <div id="userChip" class="user-chip" onclick="logout()">
                <div class="avatar-circle" id="userIcon"></div>
                <span id="userNameDisplay" style="font-size: 0.75rem; font-weight: 600;">Oyunçu ❌</span>
            </div>
        </div>
    </div>

    <div class="payment-card">
        <div class="card-label">💳 Birbank / Kart Hesabı</div>
        <div class="card-number">4169 7388 6262 7472</div>
        <button class="btn-copy-card" onclick="copyCard()">📄 KART NÖMRƏSİNİ KOPYALA</button>
    </div>

    <div class="glass-panel">
        <input type="tel" id="playerID" class="main-input" placeholder="🆔 PUBG ID-nizi yazın">
        <label for="receiptInput" id="fileLabel" class="file-upload-label">📸 Ödəniş Çekini Yüklə</label>
        <input type="file" id="receiptInput" accept="image/*" style="display:none;" onchange="handleFile(this)">
        <button class="btn-premium" style="width: 100%; background: #fff; color: #000;" onclick="verifyID()">🔍 ID YOXLA</button>
        <div id="idStatus" style="margin-top: 12px; text-align: center; font-weight: 700; font-size:0.85rem;"></div>
    </div>

    <div class="uc-grid" id="productGrid">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        databaseURL: "https://stargameaz-default-rtdb.firebaseio.com",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;
    let receiptBase64 = "";
    let verified = false;

    // TAM QİYMƏT SİYAHISI
    const products = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"},
        {u: "90 UC", p: "3.00 AZN"}, {u: "120 UC", p: "4.00 AZN"},
        {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "9.00 AZN"}, {u: "355 UC", p: "10.00 AZN"},
        {u: "385 UC", p: "11.00 AZN"}, {u: "660 UC", p: "16.00 AZN"},
        {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "25.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"},
        {u: "16200 UC", p: "310.00 AZN"}
    ];

    window.onload = function() {
        const grid = document.getElementById('productGrid');
        products.forEach(item => {
            grid.innerHTML += `<div class="uc-card" onclick="order('${item.u}', '${item.p}')"><span class="uc-title">${item.u}</span><span class="uc-price">${item.p}</span></div>`;
        });
        const savedUser = localStorage.getItem('stargame_user');
        if (savedUser) { currentUser = JSON.parse(savedUser); updateUserUI(currentUser); }
    };

    function toggleWaMenu() {
        const menu = document.getElementById('waMenu');
        menu.classList.toggle('active');
    }

    function showLogin() { 
        // Google login modalı burada açılacaq (Köhnə kodun eynisi)
        alert("Giriş üçün Google düyməsini istifadə edin."); 
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onloadend = () => {
            receiptBase64 = reader.result;
            document.getElementById('fileLabel').innerHTML = "✅ Çek yükləndi!";
            document.getElementById('fileLabel').style.color = "#2ecc71";
        }
        reader.readAsDataURL(input.files[0]);
    }

    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 5) return alert("❌ Düzgün ID daxil edin");
        verified = true;
        document.getElementById('idStatus').innerHTML = "✅ ID Təsdiqləndi: " + id;
        document.getElementById('idStatus').style.color = "#2ecc71";
    }

    function order(uc, price) {
        if(!verified) return alert("⚠️ Öncə ID yoxlayın");
        if(!currentUser) return alert("⚠️ Zəhmət olmasa Giriş edin!");
        if(!receiptBase64) return alert("📸 Ödəniş çekini yükləyin!");
        
        db.collection("orders").add({
            email: currentUser.email,
            uc: uc,
            price: price,
            playerID: document.getElementById('playerID').value,
            receipt: receiptBase64,
            date: new Date().toLocaleString('az-AZ'),
            status: "Gözlənilir"
        }).then(() => alert("🚀 Sifariş qəbul edildi!"));
    }

    function copyCard() {
        navigator.clipboard.writeText("4169738862627472");
        alert("✅ Kart kopyalandı!");
    }

    function updateUserUI(user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userChip').style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = user.name + " ❌";
        if(user.picture) document.getElementById('userIcon').style.backgroundImage = `url('${user.picture}')`;
    }

    function logout() { localStorage.removeItem('stargame_user'); location.reload(); }
</script>
</body>
</html>
