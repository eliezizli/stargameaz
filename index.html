    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed;
            background-size: cover; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1;

        .container { max-width: 480px; margin: auto; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; gap: 10px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; flex-shrink: 0; }
        .auth-section { display: flex; align-items: center; gap: 8px; flex-shrink: 1; }
        
        .user-chip { display: none; background: var(--glass); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 50px; backdrop-filter: blur(10px); align-items: center; gap: 6px; max-width: 160px; overflow: hidden; }
        .avatar-circle { width: 26px; height: 26px; background: var(--gold); border-radius: 50%; background-size: cover; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1rem; background-position: center; flex-shrink: 0; }
        #userNameDisplay { font-weight: 600; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s; }
        .btn-premium:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-orders-toggle { display: none; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 9px 12px; border-radius: 9px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; font-weight: 600; }

        .payment-card { 
            background: linear-gradient(135deg, #1a1a1a 0%, #e31e24 100%); 
            padding: 20px 15px; border-radius: 15px; margin: 15px 0; 
            box-shadow: 0 8px 25px rgba(227, 30, 36, 0.2); border: 1px solid rgba(255,255,255,0.1);
        }
        .card-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: #fff; margin-bottom: 8px; text-transform: uppercase; opacity: 0.8; }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin: 10px 0; display: block; color: #fff; text-align: center; }
        .btn-copy-card { background: #fff; border: none; color: #e31e24; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(15px); margin-bottom: 20px; }
        .main-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 1rem; margin-bottom: 12px; outline: none; }
        .main-input::placeholder { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

        .file-upload-label { display: block; padding: 14px; background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 0.8rem; transition: 0.3s; color: #fff; }

        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .uc-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; -webkit-user-select: none; user-select: none; }
        .uc-card:active { transform: scale(0.95); border-color: var(--gold); background: rgba(255, 215, 0, 0.08); }
        .uc-title { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; color: #fff; }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; }

        .order-panel {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 85vh;
            background: #0f0f0f; border-radius: 20px 20px 0 0; z-index: 1001;
            transition: 0.5s cubic-bezier(0.3, 0.8, 0.4, 1); padding: 20px 15px; border-top: 2px solid var(--gold);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .order-panel.active { bottom: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        
        .order-item { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--gold); font-size: 0.8rem; }
        .status-badge { font-size: 0.6rem; padding: 4px 8px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 15px; }
        .modal-box { background: #111; width: 100%; max-width: 340px; padding: 30px 20px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2); }
        .modal-box h2 { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 20px; font-size: 1.3rem; }
        .modal-box p { font-size: 0.8rem; color: #bbb; margin-top: 15px; line-height: 1.4; }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 15px;
            background-color: #25d366;
            color: #fff;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 8px;
            z-index: 999;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .whatsapp-float:active { transform: scale(0.9) translateY(2px); }
        .whatsapp-float img { width: 22px; height: 22px; }

        @media screen and (max-width: 400px) {
            .logo { font-size: 1.1rem; }
            .card-number { font-size: 1rem; }
            .uc-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<a href="https://wa.me/994503482470?text=Salam,%20StarGameAz%20saytından%20yazıram." class="whatsapp-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">

<div class="overlay" id="overlay" onclick="toggleOrders()"></div>
<div class="order-panel" id="orderPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1);">
        <h3 style="font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem;">📋 SİFARİŞLƏRİM</h3>
        <span onclick="toggleOrders()" style="cursor:pointer; font-size: 1.8rem; color: #fff; line-height:1;">&times;</span>
    </div>
    <div id="ordersList" style="overflow-y: auto; height: calc(100% - 50px); padding-right:5px;"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-box">
        <h2>🔑 GİRİŞ</h2>
        <div id="g_id_onload"
             data-client_id="512841497901-215itq61u0rv1e1ho8fin2jceestn0am.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_blue" data-shape="rectangular" data-logo_alignment="left"></div>
        <p>Sifarişlərinizi izləmək üçün daxil olun.</p>
        <button onclick="closeModal()" style="background:none; border:none; color:#fff; margin-top:15px; cursor:pointer; text-decoration:underline; font-size:0.8rem;">Bağla</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">STARGAMEAZE</div>
        <div class="auth-section">
            <button id="orderHistoryBtn" class="btn-orders-toggle" onclick="toggleOrders()">🛒 Tarixçə</button>
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">👤 GİRİŞ</button>
            <div id="userChip" class="user-chip">
                <div class="avatar-circle" id="userIcon">🎮</div>
                <span id="userNameDisplay" onclick="logout()">Oyunçu ❌</span>
            </div>
        </div>
    </div>

    <div class="payment-card">
        <div class="card-label">💳 Birbank / Kart Hesabı</div>
        <div class="card-number">4169 7388 6262 7472</div>
        <button class="btn-copy-card" onclick="copyCard()">📄 KART NÖMRƏSİNİ KOPYALA</button>
    </div>

    <div class="glass-panel">
        <input type="tel" id="playerID" class="main-input" placeholder="🆔 PUBG ID-nizi yazın" inputmode="numeric">
        <label for="receiptInput" id="fileLabel" class="file-upload-label">
            📸 Ödəniş Çekini Yüklə (Mütləq!)
        </label>
        <input type="file" id="receiptInput" accept="image/*" style="display:none;" onchange="handleFile(this)">
        <button id="verifyBtn" class="btn-premium" style="width: 100%; background: #fff; color: #000; border-radius:10px;" onclick="verifyID()">🔍 ID YOXLA</button>
        <div id="idStatus" style="margin-top: 12px; text-align: center; font-weight: 700; font-size:0.85rem;"></div>
    </div>

    <div class="uc-grid" id="productGrid"></div>
    <div style="height: 70px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentUser = null;
    let receiptBase64 = "";
    let verified = false;

    const products = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"},
        {u: "90 UC", p: "3.00 AZN"}, {u: "120 UC", p: "4.00 AZN"},
        {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "9.00 AZN"}, {u: "355 UC", p: "10.00 AZN"},
        {u: "385 UC", p: "11.00 AZN"}, {u: "660 UC", p: "16.00 AZN"},
        {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "25.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"},
        {u: "16200 UC", p: "310.00 AZN"}
    ];

    window.onload = function() {
        const savedUser = localStorage.getItem('stargame_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateUserUI(currentUser);
            listenStatus();
        }
    };

    function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    
    function logout() {
        if(confirm("Hesabdan çıxmaq istəyirsiniz?")) {
            localStorage.removeItem('stargame_user');
            location.reload();
        }
    }

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload;
        localStorage.setItem('stargame_user', JSON.stringify(payload));
        closeModal();
        updateUserUI(payload);
        listenStatus();
    }

    function updateUserUI(user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('orderHistoryBtn').style.display = 'block';
        document.getElementById('userChip').style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = user.name + " ❌";
        const icon = document.getElementById('userIcon');
        if(user.picture) icon.style.backgroundImage = `url('${user.picture}')`;
    }

    function handleFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            receiptBase64 = reader.result;
            document.getElementById('fileLabel').innerHTML = "✅ Çek yükləndi!";
            document.getElementById('fileLabel').style.color = "#2ecc71";
        }
        if(file) reader.readAsDataURL(file);
    }

    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 5) return alert("❌ Düzgün ID daxil edin");
        verified = true;
        document.getElementById('idStatus').innerHTML = "✅ Oyunçu Tapıldı: " + id;
        document.getElementById('idStatus').style.color = "#2ecc71";
    }

    const grid = document.getElementById('productGrid');
    products.forEach(item => {
        grid.innerHTML += `<div class="uc-card" onclick="order('${item.u}', '${item.p}')"><span class="uc-title">${item.u}</span><span class="uc-price">${item.p}</span></div>`;
    });

    function order(uc, price) {
        if(!verified) return alert("⚠️ Öncə ID yoxlayın");
        if(!currentUser) return showLogin();
        if(!receiptBase64) return alert("📸 Zəhmət olmasa ödəniş çekini yükləyin!");
        
        const playerID = document.getElementById('playerID').value;
        const orderData = {
            email: currentUser.email,
            userName: currentUser.name,
            uc: uc,
            price: price,
            playerID: playerID,
            receipt: receiptBase64,
            date: new Date().toLocaleString('az-AZ'),
            status: "Gözlənilir"
        };

        db.collection("orders").add(orderData).then(() => {
            alert("🚀 Sifariş qəbul edildi!");
            receiptBase64 = ""; 
            document.getElementById('fileLabel').innerHTML = "📸 Ödəniş Çekini Yüklə (Mütləq!)";
            document.getElementById('fileLabel').style.color = "#fff";
        });
    }

    function toggleOrders() {
        const panel = document.getElementById('orderPanel');
        panel.classList.toggle('active');
        document.getElementById('overlay').style.display = panel.classList.contains('active') ? 'block' : 'none';
        if(currentUser && panel.classList.contains('active')) loadOrders();
    }

    function copyCard() {
        navigator.clipboard.writeText("4169738862627472");
        alert("✅ Kart nömrəsi kopyalandı!");
    }

    function listenStatus() {
        if(!currentUser) return;
        db.collection("orders").where("email", "==", currentUser.email)
          .onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if (change.type === "modified") {
                    const data = change.doc.data();
                    alert(`Sifariş Statusu: ${data.status}\nPaket: ${data.uc}`);
                }
            });
        });
    }

    function loadOrders() {
        db.collection("orders").where("email", "==", currentUser.email).get().then(snap => {
            const list = document.getElementById('ordersList');
            let html = "";
            let items = [];
            snap.forEach(doc => items.push(doc.data()));
            items.sort((a,b) => new Date(b.date) - new Date(a.date));
            items.forEach(d => {
                let sColor = d.status === "Təsdiqləndi" ? "#2ecc71" : (d.status === "İnkar edildi" ? "#e74c3c" : "#FFD700");
                html += `
                    <div class="order-item" style="border-left-color: ${sColor}">
                        <div><b>${d.uc}</b><br><small>${d.date}</small></div>
                        <div class="status-badge" style="background:${sColor}">${d.status}</div>
                    </div>`;
            });
            list.innerHTML = html || "<p style='text-align:center;'>Sifariş yoxdur.</p>";
        });
    }
</script>
</body>
</html>
