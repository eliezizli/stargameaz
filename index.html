<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | Birbank Ödənişli UC</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed;
            background-size: cover; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1;
        }

        .container { max-width: 480px; margin: auto; padding: 20px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; }

        .auth-section { display: flex; align-items: center; gap: 10px; }
        .user-chip { display: none; background: var(--glass); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px; backdrop-filter: blur(10px); align-items: center; gap: 8px; }
        .avatar-circle { width: 30px; height: 30px; background: var(--gold); border-radius: 50%; background-size: cover; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }

        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-orders-toggle { display: none; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; font-weight: 600; }

        /* Ödəniş Kartı */
        .payment-card { 
            background: linear-gradient(135deg, #1a1a1a 0%, #e31e24 100%); 
            padding: 30px 20px; border-radius: 20px; margin: 20px 0; 
            box-shadow: 0 10px 30px rgba(227, 30, 36, 0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .card-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; letter-spacing: 3px; margin: 15px 0; display: block; color: #fff; }
        .btn-copy-card { background: #fff; border: none; color: #e31e24; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* Input Paneli */
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; backdrop-filter: blur(15px); margin-bottom: 25px; }
        .main-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 15px; outline: none; }

        /* UC Grid */
        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .uc-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px 10px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .uc-card:active { transform: scale(0.95); border-color: var(--gold); }
        .uc-title { font-weight: 700; font-size: 1.3rem; display: block; margin-bottom: 5px; }
        .uc-price { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 0.85rem; }

        /* Sifariş Tarixçəsi Paneli */
        .order-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh;
            background: #0f0f0f; border-radius: 25px 25px 0 0; z-index: 1001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px 20px; border-top: 2px solid var(--gold);
        }
        .order-panel.active { bottom: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(4px); }
        
        .order-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .status-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }

        /* Login Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #111; width: 85%; max-width: 350px; padding: 35px; border-radius: 25px; border: 1px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleOrders()"></div>
<div class="order-panel" id="orderPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="font-family: 'Orbitron'; color: var(--gold); font-size: 1rem;">SİFARİŞLƏRİM</h3>
        <span onclick="toggleOrders()" style="cursor:pointer; font-size: 2rem; color: #fff;">&times;</span>
    </div>
    <div id="ordersList" style="overflow-y: auto; height: calc(100% - 60px);"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-box">
        <h2 style="font-family: 'Orbitron'; color: var(--gold); margin-bottom: 25px;">SİSTEMƏ GİRİŞ</h2>
        <div id="g_id_onload"
             data-client_id="512841497901-215itq61u0rv1e1ho8fin2jceestn0am.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_blue"></div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">Sifariş vermək və izləmək üçün daxil olun.</p>
        <button onclick="closeModal()" style="background:none; border:none; color:#fff; margin-top:15px; cursor:pointer; text-decoration:underline;">Bağla</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">STARGAMEAZ</div>
        <div class="auth-section">
            <button id="orderHistoryBtn" class="btn-orders-toggle" onclick="toggleOrders()">Sifarişlər</button>
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">GİRİŞ</button>
            <div id="userChip" class="user-chip">
                <div class="avatar-circle" id="userIcon">?</div>
                <span id="userNameDisplay" style="font-weight: 600; font-size: 0.8rem;">Oyunçu</span>
            </div>
        </div>
    </div>

    <div class="payment-card">
        <div class="card-label">Birbank / Kart Hesabı</div>
        <div class="card-number" id="cardNum">4169 7388 6262 7472</div>
        <button class="btn-copy-card" onclick="copyCard()">KART NÖMRƏSİNİ KOPYALA</button>
    </div>

    <div class="glass-panel">
        <input type="tel" id="playerID" class="main-input" placeholder="PUBG ID-nizi yazın">
        <button id="verifyBtn" class="btn-premium" style="width: 100%; background: #fff; color: #000;" onclick="verifyID()">ID YOXLA</button>
        <div id="idStatus" style="margin-top: 15px; text-align: center; font-weight: 700;"></div>
    </div>

    <div class="uc-grid" id="productGrid"></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;

    const products = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"},
        {u: "90 UC", p: "3.00 AZN"}, {u: "120 UC", p: "4.00 AZN"},
        {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "9.00 AZN"}, {u: "355 UC", p: "10.00 AZN"},
        {u: "385 UC", p: "11.00 AZN"}, {u: "660 UC", p: "16.00 AZN"},
        {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "25.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"},
        {u: "16200 UC", p: "310.00 AZN"}
    ];

    function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    
    function toggleOrders() {
        const panel = document.getElementById('orderPanel');
        panel.classList.toggle('active');
        document.getElementById('overlay').style.display = panel.classList.contains('active') ? 'block' : 'none';
        if(currentUser && panel.classList.contains('active')) loadOrders();
    }

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload;
        
        closeModal();
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('orderHistoryBtn').style.display = 'block';
        document.getElementById('userChip').style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = payload.name;
        
        const icon = document.getElementById('userIcon');
        if(payload.picture) {
            icon.style.backgroundImage = `url('${payload.picture}')`;
            icon.innerText = "";
        }
        loadOrders();
    }

    function copyCard() {
        navigator.clipboard.writeText("4169738862627472");
        alert("Kart nömrəsi kopyalandı!");
    }

    let verified = false;
    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 5) return alert("Düzgün ID daxil edin");
        verified = true;
        document.getElementById('idStatus').innerHTML = "✅ TƏSDİQLƏNDİ: " + id;
        document.getElementById('idStatus').style.color = "#2ecc71";
    }

    const grid = document.getElementById('productGrid');
    products.forEach(item => {
        grid.innerHTML += `<div class="uc-card" onclick="order('${item.u}', '${item.p}')"><span class="uc-title">${item.u}</span><span class="uc-price">${item.p}</span></div>`;
    });

    // SİFARİŞ VƏ SƏNİN İSTƏDİYİN WHATSAPP MESAJI
    function order(uc, price) {
        if(!verified) return alert("Öncə ID yoxlayın");
        if(!currentUser) return showLogin();
        
        const playerID = document.getElementById('playerID').value;
        const orderData = {
            email: currentUser.email,
            uc: uc,
            price: price,
            playerID: playerID,
            date: new Date().toLocaleString('az-AZ'),
            status: "Gözlənilir"
        };

        db.collection("orders").add(orderData).then(() => {
            // Sənin istədiyin Mesaj Formatı
            const text = `Salam StarGameAz!%0A%0A🌟 Paket: ${uc}%0A💰 Qiymət: ${price}%0A🆔 PUBG ID: ${playerID}%0A👤 Müştəri: ${currentUser.name}%0A💳 Ödəniş: Birbank`;
            window.open(`https://wa.me/994503482470?text=${text}`, '_blank');
        });
    }

    function loadOrders() {
        db.collection("orders").where("email", "==", currentUser.email).get().then(snap => {
            const list = document.getElementById('ordersList');
            if(snap.empty) { list.innerHTML = "<p style='text-align:center; opacity:0.5;'>Sifariş tapılmadı.</p>"; return; }
            
            let html = "";
            let items = [];
            snap.forEach(doc => items.push(doc.data()));
            items.sort((a,b) => new Date(b.date) - new Date(a.date));

            items.forEach(d => {
                let sColor = "#FFD700";
                if(d.status === "Təsdiqləndi") sColor = "#2ecc71";
                if(d.status === "İnkar edildi") sColor = "#e74c3c";

                html += `
                    <div class="order-item" style="border-left-color: ${sColor}">
                        <div><b>${d.uc}</b><br><small style="opacity:0.5">${d.date}</small></div>
                        <div class="status-badge" style="background:${sColor}; color:${sColor==='#FFD700'?'#000':'#fff'}">${d.status}</div>
                    </div>`;
            });
            list.innerHTML = html;
        });
    }
</script>
</body>
</html>
