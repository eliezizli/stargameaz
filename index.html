<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | Ucuz PUBG Mobile UC Satışı</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background: url('https://w0.peakpx.com/wallpaper/453/147/HD-wallpaper-pubg-mobile-season-13-battle-royale-games-pubg.jpg') no-repeat center center fixed;
            background-size: cover; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1;
        }

        /* ONLAYN SAYĞACI STİLİ */
        .online-counter {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }
        .dot { width: 6px; height: 6px; background: #00ff00; border-radius: 50%; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .container { max-width: 480px; margin: auto; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .logo-area { display: flex; flex-direction: column; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        
        /* Digər lazımi stillər (qısaldılmış) */
        .auth-section { display: flex; align-items: center; gap: 8px; }
        .btn-premium { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .payment-card { background: linear-gradient(135deg, #1a1a1a 0%, #e31e24 100%); padding: 20px 15px; border-radius: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .card-number { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin: 10px 0; display: block; }
        .btn-copy-card { background: #fff; border: none; color: #e31e24; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; }
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(15px); margin-bottom: 20px; }
        .main-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; text-align: center; margin-bottom: 12px; }
        .uc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 80px; }
        .uc-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; }
        
        /* WhatsApp Menyu */
        .whatsapp-container { position: fixed; bottom: 20px; right: 15px; z-index: 999; display: flex; flex-direction: column; align-items: flex-end; }
        .wa-menu { display: none; background: #1a1a1a; border: 1px solid var(--gold); border-radius: 15px; padding: 12px; margin-bottom: 10px; width: 190px; }
        .wa-menu.active { display: flex; flex-direction: column; gap: 8px; }
        .wa-option { background: #25d366; color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-align: center; }
        .whatsapp-float { background-color: #25d366; color: #fff; border-radius: 50px; display: flex; align-items: center; padding: 10px 16px; gap: 8px; cursor: pointer; }
        .whatsapp-float img { width: 22px; }

        /* Sifariş Tarixçəsi Paneli */
        .order-panel { position: fixed; bottom: -110%; left: 0; width: 100%; height: 85vh; background: #0f0f0f; border-radius: 20px 20px 0 0; z-index: 1001; transition: 0.5s; padding: 20px; border-top: 2px solid var(--gold); }
        .order-panel.active { bottom: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="online-counter">
                <div class="dot"></div> <span id="onlineCount">Yüklənir...</span> onlayn
            </div>
            <div class="logo">STARGAMEAZ</div>
        </div>
        <div class="auth-section">
            <button id="orderHistoryBtn" class="btn-premium" style="display:none; background:rgba(255,255,255,0.1); color:#fff;" onclick="toggleOrders()">🛒 Tarixçə</button>
            <button id="loginBtn" class="btn-premium" onclick="showLogin()">👤 GİRİŞ</button>
        </div>
    </div>

    <div class="payment-card">
        <div style="font-size:0.7rem; opacity:0.7;">💳 Birbank / m10</div>
        <div class="card-number">4169 7388 6262 7472</div>
        <button class="btn-copy-card" onclick="copyCard()">📄 KOPYALA</button>
    </div>

    <div class="glass-panel">
        <input type="tel" id="playerID" class="main-input" placeholder="🆔 PUBG ID-nizi yazın">
        <label for="receiptInput" id="fileLabel" style="display:block; padding:12px; border:1px dashed var(--gold); border-radius:10px; text-align:center; cursor:pointer; margin-bottom:12px; font-size:0.8rem;">📸 Çeki Yüklə</label>
        <input type="file" id="receiptInput" accept="image/*" style="display:none;" onchange="handleFile(this)">
        <button class="btn-premium" style="width:100%; background:#fff; color:#000;" onclick="verifyID()">🔍 ID YOXLA</button>
        <div id="idStatus" style="margin-top:10px; text-align:center; font-size:0.8rem;"></div>
    </div>

    <div class="uc-grid" id="productGrid"></div>
</div>

<div class="whatsapp-container">
    <div class="wa-menu" id="waMenu">
        <a href="https://wa.me/994503482470" class="wa-option" target="_blank">🟢 Dəstək 1</a>
        <a href="https://wa.me/994507665112" class="wa-option" target="_blank">🟢 Dəstək 2</a>
    </div>
    <div class="whatsapp-float" onclick="toggleWaMenu()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        <span>Canlı Dəstək</span>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleOrders()"></div>
<div class="order-panel" id="orderPanel">
    <h3 style="color:var(--gold); margin-bottom:15px;">📋 SİFARİŞLƏRİM</h3>
    <div id="ordersList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        databaseURL: "https://stargameaz-default-rtdb.firebaseio.com",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const rtdb = firebase.database();

    // ONLAYN SİSTEMİ (Realtime Database)
    const connectionsRef = rtdb.ref(".info/connected");
    const onlineUsersRef = rtdb.ref("online_users_count");

    connectionsRef.on("value", (snap) => {
        if (snap.val() === true) {
            // İstifadəçi girəndə saytı 1 artır
            const myUserRef = rtdb.ref("users_online").push(true);
            myUserRef.onDisconnect().remove();

            // Cəmi saytı izlə
            rtdb.ref("users_online").on("value", (s) => {
                document.getElementById("onlineCount").innerText = s.numChildren();
            });
        }
    });

    const products = [
        {u: "30 UC", p: "1.00 AZN"}, {u: "60 UC", p: "2.00 AZN"},
        {u: "90 UC", p: "3.00 AZN"}, {u: "120 UC", p: "4.00 AZN"},
        {u: "180 UC", p: "5.00 AZN"}, {u: "270 UC", p: "8.00 AZN"},
        {u: "325 UC", p: "9.00 AZN"}, {u: "355 UC", p: "10.00 AZN"},
        {u: "385 UC", p: "11.00 AZN"}, {u: "660 UC", p: "16.00 AZN"},
        {u: "720 UC", p: "18.00 AZN"}, {u: "780 UC", p: "20.00 AZN"},
        {u: "985 UC", p: "25.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"},
        {u: "16200 UC", p: "310.00 AZN"}
    ];

    window.onload = () => {
        const grid = document.getElementById('productGrid');
        products.forEach(item => {
            grid.innerHTML += `<div class="uc-card" onclick="order('${item.u}', '${item.p}')"><span style="display:block; font-weight:700;">${item.u}</span><span style="color:var(--gold); font-size:0.8rem;">${item.p}</span></div>`;
        });
    };

    function toggleWaMenu() { document.getElementById('waMenu').classList.toggle('active'); }
    function copyCard() { navigator.clipboard.writeText("4169738862627472"); alert("Kopyalandı!"); }
    
    // Digər funksiyalar (Login, Order və s. əvvəlki kodun eynisidir)
    function verifyID() {
        const id = document.getElementById('playerID').value;
        if(id.length < 5) return alert("ID daxil edin");
        document.getElementById('idStatus').innerHTML = "✅ ID Tapıldı: " + id;
        document.getElementById('idStatus').style.color = "#00ff00";
    }
</script>
</body>
</html>
