<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarGameAz | UC Satışı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; }
        .wrapper { max-width: 500px; margin: auto; padding-bottom: 50px; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--gold); }
        
        .login-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .user-profile { display: none; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--gold); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* Bank Card */
        .bank-box { background: linear-gradient(135deg, var(--red) 0%, #9b1317 100%); padding: 25px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(227,30,36,0.2); }
        .card-num { font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; font-family: monospace; display: block; margin: 15px 0; }
        .copy-btn { background: #fff; border: none; color: var(--red); padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* ID Input */
        .id-section { background: #151515; padding: 25px; border-radius: 25px; border: 1px solid #222; margin-bottom: 25px; text-align: center; }
        #pid { width: 100%; box-sizing: border-box; padding: 16px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1.3rem; margin-bottom: 15px; outline: none; }
        #check-btn { width: 100%; background: var(--gold); border: none; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; color: #000; }

        /* Products */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product { background: #1a1a1a; border: 1px solid #222; padding: 25px 10px; border-radius: 22px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .product:active { transform: scale(0.95); }
        .uc-name { font-weight: 700; font-size: 1.4rem; display: block; }
        .price { color: var(--gold); font-size: 1.1rem; font-weight: 600; }
        
        /* Modal */
        #loginModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:#222; padding:30px; border-radius:25px; text-align:center; width:80%; max-width:350px; border:1px solid #333; }
    </style>
</head>
<body>

<div id="loginModal">
    <div class="modal-content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_探_Logo.svg" width="40">
        <h3>Google ilə daxil ol</h3>
        <p style="font-size:0.8rem; color:#aaa;">StarGameAz-a davam etmək üçün hesab seçin</p>
        <div id="loading" style="display:none; margin:20px 0;">⌛ Yoxlanılır...</div>
        <button onclick="confirmLogin()" style="width:100%; background:#fff; color:#000; border:none; padding:12px; border-radius:10px; font-weight:700; cursor:pointer;">Hesabı təsdiqlə</button>
    </div>
</div>

<div class="wrapper">
    <div class="navbar">
        <div class="logo">StarGameAz</div>
        <button class="login-btn" id="loginBtn" onclick="openLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_探_Logo.svg" width="16"> Giriş
        </button>
        <div class="user-profile" id="userProfile">
            <div class="avatar">AZ</div>
            <div style="font-size: 0.8rem;"><b id="userName">Oyunçu</b><br><span style="color:var(--gold)">Bonus: 0.50 AZN</span></div>
        </div>
    </div>

    <div class="bank-box">
        <button class="copy-btn" onclick="copyCard()">KOPYALA</button>
        <div style="font-size: 0.9rem; font-weight: 700;">M10 / BİNBANK</div>
        <span class="card-num" id="cardNo">4169 7388 6262 7472</span>
    </div>

    <div class="id-section">
        <input type="tel" id="pid" placeholder="PUBG ID-nizi yazın...">
        <button id="check-btn" onclick="checkPlayer()">ID YOXLA</button>
        <div id="player-info" style="margin-top: 15px; font-size: 0.9rem; font-weight: 600;"></div>
    </div>

    <div class="grid" id="items"></div>
</div>

<script>
    function openLogin() {
        document.getElementById('loginModal').style.display = 'flex';
    }

    function confirmLogin() {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        setTimeout(() => {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userProfile').style.display = 'flex';
            alert("Uğurla giriş edildi!");
        }, 1500);
    }

    function copyCard() {
        const num = document.getElementById('cardNo').innerText.replace(/\s/g, '');
        navigator.clipboard.writeText(num).then(() => alert("Kart kopyalandı!"));
    }

    let isVerified = false;
    function checkPlayer() {
        const id = document.getElementById('pid').value;
        const info = document.getElementById('player-info');
        if(id.length < 7) { alert("ID düzgün deyil!"); return; }
        info.innerHTML = "🔍 Yoxlanılır...";
        setTimeout(() => {
            isVerified = true;
            info.innerHTML = `✅ ID: ${id} (AKTİV)`;
            info.style.color = "#2ecc71";
        }, 1000);
    }

    const items = [
        {u: "60 UC", p: "2.00 AZN"}, {u: "325 UC", p: "8.50 AZN"},
        {u: "660 UC", p: "16.00 AZN"}, {u: "1800 UC", p: "41.00 AZN"},
        {u: "3850 UC", p: "81.00 AZN"}, {u: "8100 UC", p: "155.00 AZN"}
    ];

    const container = document.getElementById('items');
    items.forEach(i => {
        container.innerHTML += `<div class="product" onclick="sendOrder('${i.u}','${i.p}')"><span class="uc-name">${i.u}</span><span class="price">${i.p}</span></div>`;
    });

    function sendOrder(u, p) {
        const id = document.getElementById('pid').value;
        if(!isVerified) { alert("Öncə ID yoxlayın!"); return; }
        const msg = `Salam StarGameAz, mən ödəniş etdim.%0A Paket: ${u}%0A Qiymət: ${p}%0A ID: ${id}`;
        window.open(`https://wa.me/994503482470?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
