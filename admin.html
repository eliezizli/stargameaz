<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGameAz | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Poppins', sans-serif; padding: 20px; margin: 0; }
        .header { border-bottom: 2px solid #FFD700; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Giriş Ekranı */
        #adminAuth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .auth-input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; text-align: center; font-size: 1rem; }
        
        /* Kartlar */
        .order-card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        .order-info { margin-bottom: 10px; font-size: 0.85rem; line-height: 1.6; }
        .order-info b { color: #FFD700; }
        
        /* Düymələr */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        .btn-approve { background: #2ecc71; color: #000; }
        .btn-reject { background: #e74c3c; color: #fff; }
        .btn-receipt { background: #3498db; color: #fff; }
        .btn-delete { background: #444; color: #fff; flex: 0.4; }
        
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; color: #000; }

        /* Şəkil Baxış Modalı */
        #imgModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        #imgModal img { max-width: 100%; max-height: 90vh; border-radius: 10px; border: 2px solid #FFD700; }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
</div>

<div id="adminAuth">
    <h3 style="color:#FFD700;">ADMIN GİRİŞ</h3>
    <input type="password" id="adminPass" class="auth-input" placeholder="Parolu yazın">
    <button onclick="checkPass()" style="background:#FFD700; color:#000; width: 150px;">DAXİL OL</button>
</div>

<div class="header">
    <div>
        <h2 style="margin:0; color:#FFD700;">Admin Panel</h2>
        <small id="stats">Yüklənir...</small>
    </div>
    <button onclick="location.reload()" style="background:none; color:#888; border:1px solid #333; width:auto; padding:5px 10px;">Yenilə</button>
</div>

<div id="adminOrders"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "eliezizli") {
            document.getElementById('adminAuth').style.display = 'none';
            loadAllOrders();
        } else {
            alert("Yanlış parol!");
        }
    }

    function loadAllOrders() {
        // onSnapshot istifadə edirik ki, yeni sifariş gələndə səhifəni yeniləmədən düşsün
        db.collection("orders").orderBy("date", "desc").onSnapshot(snap => {
            const list = document.getElementById('adminOrders');
            document.getElementById('stats').innerText = `Cəmi: ${snap.size} sifariş`;
            list.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                
                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-info">
                            <b>📦 Paket:</b> ${d.uc}<br>
                            <b>💰 Qiymət:</b> ${d.price}<br>
                            <b>🆔 PUBG ID:</b> <span style="font-size: 1.1rem; letter-spacing: 1px;">${d.playerID}</span><br>
                            <b>👤 Müştəri:</b> ${d.userName || d.email}<br>
                            <b>📧 Email:</b> ${d.email}<br>
                            <b>📅 Tarix:</b> ${d.date}<br>
                            <b>🔔 Status:</b> <span class="status-badge" style="background:${getStatusColor(d.status)}">${d.status}</span>
                        </div>
                        <div class="btn-group">
                            ${d.receipt ? `<button class="btn-receipt" onclick="viewReceipt('${d.receipt}')">🖼️ Çekə Bax</button>` : ''}
                            <button class="btn-approve" onclick="updateStatus('${id}', 'Təsdiqləndi')">✅ Təsdiqlə</button>
                            <button class="btn-reject" onclick="updateStatus('${id}', 'İnkar edildi')">❌ İnkar et</button>
                            <button class="btn-delete" onclick="deleteOrder('${id}')">🗑️ Sil</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // Şəkli göstərmək üçün funksiya
    function viewReceipt(src) {
        document.getElementById('modalImg').src = src;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function updateStatus(docId, newStatus) {
        db.collection("orders").doc(docId).update({ status: newStatus }).then(() => {
            console.log("Status yeniləndi");
        });
    }

    function deleteOrder(docId) {
        if(confirm("Bu sifarişi silmək istəyirsən? (Geri qaytarmaq olmur)")) {
            db.collection("orders").doc(docId).delete();
        }
    }

    function getStatusColor(s) {
        if(s === "Təsdiqləndi") return "#2ecc71";
        if(s === "İnkar edildi") return "#e74c3c";
        return "#FFD700"; // Gözlənilir statusu üçün sarı
    }
</script>
</body>
</html>
