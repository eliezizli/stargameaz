<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGameAze | Professional Admin Panel</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/HJLz7PTz/Standard.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0a0a0a; --blue: #3498db; --green: #2ecc71; --purple: #9b59b6; --orange: #e67e22; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; }
        
        .header { border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); margin: 0; font-size: 1.2rem; }
        
        #adminAuth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .auth-box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 85%; max-width: 350px; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #050505; color: #fff; text-align: center; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .card { background: #151515; border-radius: 15px; padding: 15px; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; margin-bottom: 10px; text-align: center; display: block; letter-spacing: 1px; }
        
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; transition: 0.2s; }
        
        .btn-approve { background: var(--green); color: #000; }
        .btn-reject { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-logout { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; font-size: 0.6rem; }
        
        /* Çat Bölməsi */
        .chat-admin-card { background: #111; border: 1px solid var(--gold); border-radius: 15px; margin-top: 20px; height: 500px; display: flex; flex-direction: column; }
        .chat-list { flex: 0.4; border-right: 1px solid #222; overflow-y: auto; padding: 10px; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-messages-box { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.5); }
        .chat-user-item { padding: 10px; background: #222; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 0.7rem; }
        .chat-user-item.active { background: var(--gold); color: #000; }
        
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; max-width: 80%; font-size: 0.75rem; }
        .msg.admin { background: var(--gold); color: #000; align-self: flex-end; }
        .msg.user { background: #333; color: #fff; align-self: flex-start; }

        .order-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--gold); font-size: 0.8rem; }
        #imgModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        #imgModal img { max-width: 90%; max-height: 80vh; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="imgModal">
    <span onclick="document.getElementById('imgModal').style.display='none'" style="position:absolute; top:20px; right:20px; color:#fff; font-size:2rem; cursor:pointer;">&times;</span>
    <img id="modalImg" src="">
</div>

<div id="adminAuth">
    <div class="auth-box">
        <h3 style="color:var(--gold); font-family: 'Orbitron';">ADMIN LOGIN</h3>
        <input type="password" id="adminPass" class="auth-input" placeholder="Parol">
        <button onclick="checkPass()" style="background:var(--gold); color:#000; width:100%; border-radius:8px;">GİRİŞ</button>
    </div>
</div>

<div class="header">
    <div>
        <h2>ADMIN PANEL</h2>
        <small id="stats" style="color: #888;">Yüklənir...</small>
    </div>
    <button onclick="logoutAdmin()" class="btn-logout">ÇIXIŞ</button>
</div>

<div class="admin-grid">
    <div class="card">
        <span class="card-title">SAYT STATUSU</span>
        <div style="text-align:center; font-size:0.8rem; margin-bottom:10px;" id="current-status">Yüklənir...</div>
        <div class="btn-group">
            <button class="btn-approve" onclick="updateSiteStatus(true)">ONLAYN ET</button>
            <button class="btn-reject" onclick="updateSiteStatus(false)">OFLAYN ET</button>
        </div>
    </div>
    <div class="card">
        <span class="card-title">SİFARİŞ STATİSTİKASI</span>
        <div style="text-align:center; font-size:1.1rem; font-weight:bold; color:var(--gold)" id="totalOrders">0</div>
        <div style="text-align:center; font-size:0.6rem; color:#888;">Ümumi Sifariş</div>
    </div>
</div>

<h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--gold); margin-top:20px;">💬 CANLI ÇAT (DƏSTƏK)</h3>
<div class="chat-admin-card" style="flex-direction: row;">
    <div class="chat-list" id="chatUserList">
        <div style="font-size:0.6rem; color:#666;">İstifadəçilər...</div>
    </div>
    <div class="chat-main">
        <div id="activeUserTitle" style="padding:10px; font-size:0.7rem; border-bottom:1px solid #222; color:var(--gold);">Söhbət seçilməyib</div>
        <div class="chat-messages-box" id="chatMessages" style="display:flex; flex-direction:column;"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="adminMsgInput" style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:5px;" placeholder="Cavab yazın...">
            <button onclick="sendAdminReply()" class="btn-approve" style="flex:0.2">GÖNDƏR</button>
        </div>
    </div>
</div>

<h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--gold); margin-top:30px;">📋 SON SİFARİŞLƏR</h3>
<div id="adminOrders"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let selectedUserEmail = null;

    window.onload = function() {
        if (localStorage.getItem('admin_session') === 'active') {
            document.getElementById('adminAuth').style.display = 'none';
            initAdmin();
        }
    }

    function checkPass() {
        if (document.getElementById('adminPass').value === "eliezizli") {
            localStorage.setItem('admin_session', 'active');
            document.getElementById('adminAuth').style.display = 'none';
            initAdmin();
        } else { alert("Yanlış parol!"); }
    }

    function initAdmin() {
        listenToSiteStatus();
        loadOrders();
        loadChatUsers();
    }

    // Site Online/Offline Status
    function listenToSiteStatus() {
        db.collection("settings").doc("adminStatus").onSnapshot(doc => {
            if(doc.exists) {
                const online = doc.data().online;
                const el = document.getElementById('current-status');
                el.innerText = online ? "🟢 SAYT ONLAYNDIR" : "🔴 SAYT OFLAYNDIR";
                el.style.color = online ? "#2ecc71" : "#e74c3c";
            }
        });
    }

    function updateSiteStatus(val) {
        db.collection("settings").doc("adminStatus").set({ online: val });
    }

    // Orders Management
    function loadOrders() {
        db.collection("orders").orderBy("date", "desc").onSnapshot(snap => {
            const list = document.getElementById('adminOrders');
            document.getElementById('totalOrders').innerText = snap.size;
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="order-card" style="border-left-color: ${d.status === 'Təsdiqləndi' ? '#2ecc71' : '#e31e24'}">
                        <b>📦 ${d.uc}</b> | ${d.playerID}<br>
                        <small>${d.userName} (${d.email})</small><br>
                        <small>${d.date} | Status: ${d.status}</small>
                        <div class="btn-group" style="margin-top:10px;">
                            <button class="btn-blue" onclick="viewReceipt('${d.receipt}')">ÇEK</button>
                            <button class="btn-approve" onclick="updateStatus('${id}', 'Təsdiqləndi')">TƏSDİQ</button>
                            <button class="btn-reject" onclick="updateStatus('${id}', 'İnkar edildi')">İNKAR</button>
                            <button onclick="deleteOrder('${id}')" style="background:#222; color:#fff;">🗑️</button>
                        </div>
                    </div>`;
            });
        });
    }

    function updateStatus(id, s) { db.collection("orders").doc(id).update({ status: s }); }
    function deleteOrder(id) { if(confirm("Silinsin?")) db.collection("orders").doc(id).delete(); }
    function viewReceipt(src) { document.getElementById('modalImg').src = src; document.getElementById('imgModal').style.display = 'flex'; }

    // --- CHAT SYSTEM ---
    function loadChatUsers() {
        db.collection("chats").onSnapshot(snap => {
            const users = {};
            snap.forEach(doc => {
                const d = doc.data();
                users[d.email] = d.userName || d.email;
            });
            const listEl = document.getElementById('chatUserList');
            listEl.innerHTML = "";
            for (let email in users) {
                const div = document.createElement('div');
                div.className = 'chat-user-item';
                div.innerText = users[email];
                div.onclick = () => selectUserChat(email, users[email]);
                listEl.appendChild(div);
            }
        });
    }

    function selectUserChat(email, name) {
        selectedUserEmail = email;
        document.getElementById('activeUserTitle').innerText = "Söhbət: " + name;
        db.collection("chats").where("email", "==", email).orderBy("timestamp", "asc")
        .onSnapshot(snap => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = `msg ${d.sender}`;
                div.innerText = d.message;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendAdminReply() {
        const input = document.getElementById('adminMsgInput');
        if(!input.value || !selectedUserEmail) return;
        db.collection("chats").add({
            email: selectedUserEmail,
            message: input.value,
            sender: "admin",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function logoutAdmin() { localStorage.removeItem('admin_session'); location.reload(); }
</script>
</body>
</html>
