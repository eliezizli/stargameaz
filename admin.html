<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGameAze | Professional Admin Panel</title>
    
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/HJLz7PTz/Standard.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/HJLz7PTz/Standard.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --red: #e31e24; --dark: #0a0a0a; --blue: #3498db; --green: #2ecc71; --purple: #9b59b6; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; padding: 15px; margin: 0; }
        
        .header { border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); margin: 0; font-size: 1.2rem; }
        
        #adminAuth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .auth-box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 85%; max-width: 350px; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #050505; color: #fff; text-align: center; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .card { background: #151515; border-radius: 15px; padding: 15px; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; margin-bottom: 10px; text-align: center; display: block; letter-spacing: 1px; }
        
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .btn-approve { background: var(--green); color: #000; }
        .btn-reject { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-logout { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; font-size: 0.6rem; }
        
        .calc-input { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; text-align: center; margin-bottom: 8px; font-size: 0.75rem; }
        .link-box { display: block; text-decoration: none; background: #222; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 5px; border: 1px solid #333; color: #fff; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        .link-box:hover { background: #333; border-color: var(--gold); }

        .order-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--gold); font-size: 0.8rem; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; color: #000; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; z-index: 10001; animation: fadeInUp 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        @keyframes fadeInUp { from { bottom: -50px; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        #imgModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 10px; }
        #imgModal img { max-width: 100%; max-height: 85vh; border-radius: 10px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="imgModal">
    <span onclick="document.getElementById('imgModal').style.display='none'" style="position:absolute; top:20px; right:20px; color:#fff; font-size:2rem; cursor:pointer;">&times;</span>
    <img id="modalImg" src="">
</div>

<div id="adminAuth">
    <div class="auth-box">
        <img src="https://i.postimg.cc/HJLz7PTz/Standard.png" style="width: 50px; margin-bottom: 10px;">
        <h3 style="color:var(--gold); font-family: 'Orbitron';">ADMIN LOGIN</h3>
        <input type="password" id="adminPass" class="auth-input" placeholder="Parol">
        <button onclick="checkPass()" style="background:var(--gold); color:#000; width:100%; border-radius:8px;">GİRİŞ</button>
    </div>
</div>

<div class="header">
    <div>
        <h2>STARGAMEAZE</h2>
        <small id="stats" style="color: #888; font-size: 0.7rem;">📊 Yüklenir...</small>
    </div>
    <button onclick="logoutAdmin()" class="btn-logout">ÇIXIŞ</button>
</div>

<div class="admin-grid">
    <div class="card" style="grid-column: span 2;">
        <span class="card-title" style="color: var(--blue);">MAYA KALKULYATORU</span>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="usdInput" placeholder="$ Məbləğ (USD)" class="calc-input" style="margin:0;">
            <button onclick="calculateMaya()" class="btn-blue" style="flex: 0.5;">HESABLA</button>
        </div>
        <div id="resBox" style="display:none; margin-top:10px; font-size:0.8rem; color:var(--green); font-weight:bold; text-align:center;">
            Maya: <span id="resTotal">0</span> AZN
        </div>
    </div>

    <div class="card">
        <span class="card-title" style="color: var(--purple);">SAMOGAME</span>
        <a href="https://samogame.az/categories.php?game=pubgmobile&subcategory=%C4%B0D+y%C3%BCkl%C9%99m%C9%99" target="_blank" class="link-box" style="border-color:var(--purple)">🆔 ID YÜKLƏMƏ</a>
    </div>

    <div class="card">
        <span class="card-title" style="color: #e67e22;">SKYGAMES</span>
        <a href="https://skygames.az/category/pubg-mobile-e-pin" target="_blank" class="link-box" style="border-color:#e67e22">📦 E-PİN QİYMƏTLƏRİ</a>
    </div>
</div>

<div id="adminOrders"></div>

<script>
    // --- BİLDİRİŞ İCAZƏSİ ---
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    function sendPush(title, message) {
        if (Notification.permission === "granted") {
            new Notification(title, {
                body: message,
                icon: "https://i.postimg.cc/HJLz7PTz/Standard.png"
            });
        }
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        databaseURL: "https://stargameaz-default-rtdb.firebaseio.com",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const rtdb = firebase.database();
    
    const notificationSound = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');

    window.onload = function() {
        if (localStorage.getItem('admin_session') === 'active_stargame') {
            document.getElementById('adminAuth').style.display = 'none';
            initAdmin();
        }
    }

    function checkPass() {
        if (document.getElementById('adminPass').value === "eliezizli") {
            localStorage.setItem('admin_session', 'active_stargame');
            document.getElementById('adminAuth').style.display = 'none';
            initAdmin();
        } else { alert("❌ Yanlış parol!"); }
    }

    function initAdmin() {
        loadOrders();
        trackOnlineUsers();
    }

    function trackOnlineUsers() {
        const onlineRef = rtdb.ref('online_users');
        let initialLoad = true;

        onlineRef.on('value', (snapshot) => {
            const count = snapshot.numChildren();
            document.getElementById('stats').innerHTML = `📊 <span style="color:var(--green)">${count} Onlayn</span> | Sifarişləri Yoxla`;
        });

        onlineRef.on('child_added', (snapshot) => {
            if (!initialLoad) {
                notificationSound.play().catch(() => {});
                showToast("🔔 Sayta yeni istifadəçi daxil oldu!");
                // Telefona Push Bildiriş göndərir
                sendPush("YENİ GİRİŞ!", "Biri sayta daxil oldu!");
            }
        });

        onlineRef.once('value', () => { initialLoad = false; });
    }

    function showToast(text) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function calculateMaya() {
        const usd = document.getElementById('usdInput').value;
        if(!usd) return;
        const final = (usd * 1.70) * 1.195;
        document.getElementById('resTotal').innerText = final.toFixed(2);
        document.getElementById('resBox').style.display = 'block';
    }

    function loadOrders() {
        db.collection("orders").orderBy("date", "desc").onSnapshot(snap => {
            const list = document.getElementById('adminOrders');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <div class="order-card" style="border-left-color: ${getStatusColor(d.status)}">
                        <b>📦 ${d.uc}</b> | 💰 ${d.price}<br>
                        🆔 ID: <span style="background:#222; padding:0 5px;">${d.playerID}</span> | 👤 ${d.userName || 'Naməlum'}<br>
                        📅 ${d.date} | <span class="status-badge" style="background:${getStatusColor(d.status)}">${d.status}</span>
                        <div class="btn-group" style="margin-top:10px;">
                            ${d.receipt ? `<button class="btn-blue" onclick="viewReceipt('${d.receipt}')">ÇEK</button>` : ''}
                            <button class="btn-approve" onclick="updateStatus('${id}', 'Təsdiqləndi')">Təsdiq</button>
                            <button class="btn-reject" onclick="updateStatus('${id}', 'İnkar edildi')">İnkar</button>
                            <button onclick="deleteOrder('${id}')" style="background:#333; color:#fff; flex:0.3">🗑️</button>
                        </div>
                    </div>`;
            });
        });
    }

    function updateStatus(id, s) { db.collection("orders").doc(id).update({ status: s }); }
    function deleteOrder(id) { if(confirm("Silinsin?")) db.collection("orders").doc(id).delete(); }
    function viewReceipt(src) { document.getElementById('modalImg').src = src; document.getElementById('imgModal').style.display = 'flex'; }
    function logoutAdmin() { localStorage.removeItem('admin_session'); location.reload(); }
    function getStatusColor(s) {
        if(s === "Təsdiqləndi") return "#2ecc71";
        if(s === "İnkar edildi") return "#e74c3c";
        return "#FFD700";
    }
</script>
</body>
</html>
