<div id="chat-circle" onclick="toggleChat()">
    <i class="fa fa-comments"></i> Canlı Dəstək
</div>

<div id="chat-box" style="display: none;">
    <div class="chat-header">
        <span>Texniki Dəstək</span>
        <button onclick="toggleChat()">✖</button>
    </div>
    <div class="chat-body">
        <p>Salam! 👋</p>
        <p>Hazırda operatorlarımız aktiv deyil. Sifarişinizlə bağlı <b>WhatsApp</b> üzərindən anlıq məlumat ala bilərsiniz.</p>
        <a href="https://wa.me/994XXXXXXXXX" class="wp-support-btn">
            <i class="fa fa-whatsapp"></i> WhatsApp-a Keçid
        </a>
    </div>
</div>

<style>
#chat-circle {
    position: fixed; bottom: 20px; right: 20px;
    background: #007bff; color: white; padding: 12px 20px;
    border-radius: 50px; cursor: pointer; z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
#chat-box {
    position: fixed; bottom: 80px; right: 20px;
    width: 300px; background: white; border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1000;
    overflow: hidden; font-family: sans-serif;
}
.chat-header { background: #007bff; color: white; padding: 10px; display: flex; justify-content: space-between; }
.chat-body { padding: 20px; text-align: center; }
.wp-support-btn {
    display: inline-block; background: #25D366; color: white;
    padding: 10px 20px; border-radius: 5px; text-decoration: none;
    margin-top: 10px; font-weight: bold;
}
</style>

<script>
function toggleChat() {
    var chatBox = document.getElementById("chat-box");
    chatBox.style.display = (chatBox.style.display === "none") ? "block" : "none";
}
</script>
