<div class="admin-chat-manager">
    <h3>Canlı Dəstək İdarəetməsi</h3>
    
    <div class="status-switch">
        <span>Statusunuz: </span>
        <label class="switch">
            <input type="checkbox" id="adminStatus" onchange="updateStatus()">
            <span class="slider round"></span>
        </label>
        <b id="statusText">Oflayn</b>
    </div>

    <hr>

    <div class="chat-container">
        <div class="user-list" id="userList">
            <p>Mesaj gözlənilir...</p>
        </div>

        <div class="chat-window">
            <div id="chatMessages" class="messages-area">
                <p style="text-align:center; color:#888;">Söhbətə başlamaq üçün istifadəçi seçin</p>
            </div>
            <div class="input-area">
                <input type="text" id="adminReply" placeholder="Mesajınızı yazın...">
                <button onclick="sendReply()">Göndər</button>
            </div>
        </div>
    </div>
</div>

<style>
/* Sadə və funksional dizayn */
.admin-chat-manager { background: #f4f7f6; padding: 20px; border-radius: 10px; }
.status-switch { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

/* Switch (Düymə) Dizaynı */
.switch { position: relative; display: inline-block; width: 50px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: #25D366; }
input:checked + .slider:before { transform: translateX(26px); }

/* Çat İnterfeysi */
.chat-container { display: flex; gap: 20px; height: 400px; }
.user-list { width: 30%; background: white; border: 1px solid #ddd; overflow-y: auto; padding: 10px; }
.chat-window { width: 70%; background: white; border: 1px solid #ddd; display: flex; flex-direction: column; }
.messages-area { flex-grow: 1; padding: 15px; overflow-y: auto; background: #e5ddd5; }
.input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
.input-area input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; outline: none; }
.input-area button { background: #007bff; color: white; border: none; padding: 0 15px; cursor: pointer; }
</style>
