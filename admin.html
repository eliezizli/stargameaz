<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>StarGameAze | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #FFD700; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; }
        h2 { color: #FFD700; margin-bottom: 20px; }
        .status-box { margin: 20px 0; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; width: 100%; margin: 10px 0; }
        .btn-online { background: #2ecc71; color: white; }
        .btn-offline { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        #current-status { font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>StarGameAze Admin</h2>
    <div class="status-box">
        Hazırkı Status: <br>
        <span id="current-status">Yoxlanılır...</span>
    </div>
    
    <button class="btn btn-online" onclick="changeStatus('online')">Onlayn Ol</button>
    <button class="btn btn-offline" onclick="changeStatus('offline')">Oflayn Ol</button>
    
    <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">
        Statusu dəyişdikdə saytdakı "Canlı Dəstək" düyməsi anında yenilənəcək.
    </p>
</div>

<script>
    // Firebase Konfiqurasiyası (Əsas saytdakı ilə eyni olmalıdır)
    const firebaseConfig = {
        apiKey: "AIzaSyCc0LyknaZkKUwa0RonU0HHjOsgtgcHQLg",
        authDomain: "stargameaz.firebaseapp.com",
        projectId: "stargameaz",
        databaseURL: "https://stargameaz-default-rtdb.firebaseio.com",
        storageBucket: "stargameaz.firebasestorage.app",
        messagingSenderId: "929443246287",
        appId: "1:929443246287:web:59a2f842455111194047ba"
    };

    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    // Statusu Firebase-dən oxu və ekranda göstər
    rtdb.ref('admin_settings/status').on('value', (snapshot) => {
        const status = snapshot.val();
        const display = document.getElementById('current-status');
        if(status === 'online') {
            display.innerText = "Onlayndır 🟢";
            display.style.color = "#2ecc71";
        } else {
            display.innerText = "Oflayndır 🔴";
            display.style.color = "#e74c3c";
        }
    });

    // Statusu Firebase-də dəyiş
    function changeStatus(newStatus) {
        rtdb.ref('admin_settings/status').set(newStatus)
        .then(() => {
            console.log("Status yeniləndi: " + newStatus);
        })
        .catch((error) => {
            alert("Xəta baş verdi: " + error.message);
        });
    }
</script>

</body>
</html>
